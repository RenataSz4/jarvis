<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S.</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="hud-top">
      <div class="title">J.A.R.V.I.S.</div>
      <div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
    </div>

    <div class="reactor-wrap">
      <canvas id="viz"></canvas>
      <div class="arc-reactor" id="reactor">
        <div class="ring outer"></div>
        <div class="ring mid"></div>
        <div class="ring inner"></div>
        <div class="core"><div class="core-center"></div></div>
      </div>
    </div>

    <div class="state" id="state">
      <div class="badge" id="badge">STANDBY</div>
      <div class="line" id="line">Press the mic and talk to Jarvis.</div>
    </div>

    <div class="controls">
      <input id="input" type="text" placeholder="Type or use the mic..." />
      <button id="mic">TALK</button>
    </div>
  </div>

  <script>
    (function () {
      const cv = document.getElementById('viz');
      const c = cv.getContext('2d');
      const state = document.getElementById('state');
      const root = document.documentElement;
      let w, h, midX, midY;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        const box = cv.getBoundingClientRect();
        cv.width = box.width * dpr; cv.height = box.height * dpr;
        c.setTransform(dpr, 0, 0, dpr, 0, 0);
        w = box.width; h = box.height; midX = w / 2; midY = h / 2;
      }
      window.addEventListener('resize', resize); resize();

      const bars = 84;
      const phase = Array.from({ length: bars }, () => Math.random() * Math.PI * 2);

      function draw(t) {
        const breathe = (Math.sin(t / 900) * 0.5 + 0.5) * 0.06;
        const level = Math.max(
          parseFloat(getComputedStyle(root).getPropertyValue('--intensity')) || 0,
          breathe
        );
        const listening = state.classList.contains('listening');

        c.clearRect(0, 0, w, h);
        const baseR = 108;
        for (let i = 0; i < bars; i++) {
          const ang = (i / bars) * Math.PI * 2;
          const wobble = Math.sin(t / 220 + phase[i]) * 0.5 + 0.5;
          const len = 8 + level * 78 * (0.55 + wobble * 0.45);
          const x1 = midX + Math.cos(ang) * baseR, y1 = midY + Math.sin(ang) * baseR;
          const x2 = midX + Math.cos(ang) * (baseR + len), y2 = midY + Math.sin(ang) * (baseR + len);
          const a = 0.25 + level * 0.7;
          c.strokeStyle = listening ? `rgba(255,157,46,${a})` : `rgba(58,217,255,${a})`;
          c.lineWidth = 2.4;
          c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
        }
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
